name: Build Android Python 3.10 Static

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # The standard ubuntu-latest runner already has Android SDK installed.
      # We just verify it's there.
      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev ccache unzip

      - name: Set up Host Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install python-for-android
        run: |
          python -m pip install --upgrade pip setuptools Cython virtualenv
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Run python-for-android (p4a) build
        run: |
          # python-for-android automatically uses ANDROID_SDK_ROOT and ANDROID_NDK_HOME 
          # which are already set in the ubuntu-latest runner.
          # Here we build a generic distribution containing python3 for arm64-v8a.
          p4a create --requirements=python3 --arch=arm64-v8a --dist_name=python3_dist --bootstrap=generic --ndk-api=21

      - name: Package compiled distribution
        run: |
          # The result of p4a is stored in ~/.python-for-android/dists/
          cd ~/.python-for-android/dists/python3_dist
          tar -czvf $GITHUB_WORKSPACE/python3-android-arm64-dist.tar.gz .

      - name: Upload python distribution as artifact
        uses: actions/upload-artifact@v5
        with:
          name: python3-android-arm64-dist
          path: python3-android-arm64-dist.tar.gz
          if-no-files-found: error
