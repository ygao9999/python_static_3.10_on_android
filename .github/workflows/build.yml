name: Build Android Python 3.10 Static

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The standard ubuntu-latest runner already has Android SDK installed.
      # We just verify it's there.
      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y file build-essential procps

      - name: Clone CPython source code
        run: |
          git clone https://github.com/python/cpython.git
          cd cpython
          git checkout 3.10

      - name: Build Android Python binary
        run: |
          cd cpython
          # Runs the build script per provided instructions
          ./android.py build aarch64 -- --enable-static-link

      - name: Verify statically linked executable
        run: |
          cd cpython
          file cross-build/aarch64/python

      - name: Upload static binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-aarch64
          path: cpython/cross-build/aarch64/python
          if-no-files-found: error
