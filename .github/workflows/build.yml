name: Build Android Python 3.10 (NDK Cross-Compile)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10.16"
  NDK_VERSION: "27.3.13750724"
  API_LEVEL: "28"
  TARGET_ARCH: "aarch64"
  TARGET_TRIPLE: "aarch64-linux-android"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev libffi-dev \
            libssl-dev libbz2-dev libreadline-dev libsqlite3-dev \
            libncurses-dev liblzma-dev tk-dev uuid-dev file wget

      # ── Step 1: Build Host Python 3.10 (needed by cross-compile) ──
      - name: Download CPython 3.10 source
        run: |
          wget -q https://www.python.org/ftp/python/${{ env.PYTHON_VERSION }}/Python-${{ env.PYTHON_VERSION }}.tgz
          tar xzf Python-${{ env.PYTHON_VERSION }}.tgz

      - name: Build Host Python 3.10
        run: |
          cd Python-${{ env.PYTHON_VERSION }}
          ./configure --prefix=$HOME/host-python
          make -j$(nproc)
          make install
          echo "$HOME/host-python/bin" >> $GITHUB_PATH

      # ── Step 2: Set up NDK toolchain ──
      - name: Set up NDK toolchain environment
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          SYSROOT="$TOOLCHAIN/sysroot"

          echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "SYSROOT=$SYSROOT" >> $GITHUB_ENV

          # Verify NDK exists
          ls "$TOOLCHAIN/bin/${{ env.TARGET_TRIPLE }}${{ env.API_LEVEL }}-clang" || {
            echo "::error::NDK toolchain not found at expected path"
            echo "Available NDK versions:"
            ls "$ANDROID_HOME/ndk/" 2>/dev/null || echo "No NDK found"
            exit 1
          }
          echo "NDK toolchain found successfully"

      # ── Step 3: Cross-compile dependencies (zlib, libffi, openssl) ──
      - name: Cross-compile zlib
        run: |
          wget -q https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz
          tar xzf zlib-1.3.1.tar.gz
          cd zlib-1.3.1

          export CC="${{ env.TOOLCHAIN }}/bin/${{ env.TARGET_TRIPLE }}${{ env.API_LEVEL }}-clang"
          export AR="${{ env.TOOLCHAIN }}/bin/llvm-ar"
          export RANLIB="${{ env.TOOLCHAIN }}/bin/llvm-ranlib"
          export CFLAGS="--sysroot=${{ env.SYSROOT }}"
          export PREFIX="$HOME/android-deps"

          ./configure --prefix=$PREFIX --static
          make -j$(nproc)
          make install

      - name: Cross-compile libffi
        run: |
          wget -q https://github.com/libffi/libffi/releases/download/v3.4.6/libffi-3.4.6.tar.gz
          tar xzf libffi-3.4.6.tar.gz
          cd libffi-3.4.6

          ./configure \
            --host=${{ env.TARGET_TRIPLE }} \
            --prefix=$HOME/android-deps \
            --disable-shared --enable-static \
            CC="${{ env.TOOLCHAIN }}/bin/${{ env.TARGET_TRIPLE }}${{ env.API_LEVEL }}-clang" \
            AR="${{ env.TOOLCHAIN }}/bin/llvm-ar" \
            RANLIB="${{ env.TOOLCHAIN }}/bin/llvm-ranlib" \
            CFLAGS="--sysroot=${{ env.SYSROOT }}"
          make -j$(nproc)
          make install

      - name: Cross-compile OpenSSL
        run: |
          wget -q https://github.com/openssl/openssl/releases/download/openssl-3.3.2/openssl-3.3.2.tar.gz
          tar xzf openssl-3.3.2.tar.gz
          cd openssl-3.3.2

          export ANDROID_NDK_ROOT="${{ env.NDK_PATH }}"
          export PATH="${{ env.TOOLCHAIN }}/bin:$PATH"

          ./Configure android-arm64 \
            --prefix=$HOME/android-deps \
            --openssldir=$HOME/android-deps/ssl \
            -D__ANDROID_API__=${{ env.API_LEVEL }} \
            no-shared no-tests
          make -j$(nproc)
          make install_sw

      # ── Step 4: Cross-compile CPython 3.10 ──
      - name: Cross-compile Python 3.10 for Android aarch64
        run: |
          cd Python-${{ env.PYTHON_VERSION }}

          # Clean previous host build objects
          make distclean || true

          export CC="${{ env.TOOLCHAIN }}/bin/${{ env.TARGET_TRIPLE }}${{ env.API_LEVEL }}-clang"
          export CXX="${{ env.TOOLCHAIN }}/bin/${{ env.TARGET_TRIPLE }}${{ env.API_LEVEL }}-clang++"
          export AR="${{ env.TOOLCHAIN }}/bin/llvm-ar"
          export RANLIB="${{ env.TOOLCHAIN }}/bin/llvm-ranlib"
          export STRIP="${{ env.TOOLCHAIN }}/bin/llvm-strip"
          export READELF="${{ env.TOOLCHAIN }}/bin/llvm-readelf"

          DEPS="$HOME/android-deps"

          # Fix ARM64 Bionic TLS alignment: Android requires 64-byte TLS alignment
          # but static linking defaults to 8. We create a stub with proper alignment.
          # Wrapped in a .a so duplicate LDFLAGS expansion won't cause link errors.
          cat > /tmp/tls_align_fix.c << 'EOF'
          __thread char __bionic_tls_align_fix __attribute__((aligned(64)));
          EOF
          ${{ env.TOOLCHAIN }}/bin/${{ env.TARGET_TRIPLE }}${{ env.API_LEVEL }}-clang \
            --sysroot=${{ env.SYSROOT }} -fno-emulated-tls -c /tmp/tls_align_fix.c -o /tmp/tls_align_fix.o
          ${{ env.TOOLCHAIN }}/bin/llvm-ar rcs /tmp/libtlsfix.a /tmp/tls_align_fix.o

          export CFLAGS="--sysroot=${{ env.SYSROOT }} -I$DEPS/include"
          export CPPFLAGS="--sysroot=${{ env.SYSROOT }} -I$DEPS/include"
          export LDFLAGS="--sysroot=${{ env.SYSROOT }} -L$DEPS/lib -L/tmp -static"
          export LIBS="-Wl,--whole-archive -ltlsfix -Wl,--no-whole-archive"

          # ac_cv variables work around configure tests that fail during cross-compile.
          # Android is missing many standard POSIX functions even at API 28.
          ./configure \
            --host=${{ env.TARGET_TRIPLE }} \
            --build=x86_64-linux-gnu \
            --prefix=$HOME/python-android \
            --disable-ipv6 \
            --disable-shared \
            --without-ensurepip \
            --with-build-python=$HOME/host-python/bin/python3.10 \
            --with-openssl=$DEPS \
            ac_cv_file__dev_ptmx=no \
            ac_cv_file__dev_ptc=no \
            ac_cv_buggy_getaddrinfo=no \
            ac_cv_func_sem_clockwait=no \
            ac_cv_func_close_range=no \
            ac_cv_func_copy_file_range=no \
            ac_cv_func_preadv2=no \
            ac_cv_func_pwritev2=no \
            ac_cv_func_pidfd_open=no \
            ac_cv_func_eventfd=no \
            ac_cv_func_memfd_create=no \
            ac_cv_func_sigwaitinfo=no \
            ac_cv_func_sigtimedwait=no \
            ac_cv_func_ctermid=no \
            ac_cv_func_fexecve=no \
            ac_cv_func_futimes=no \
            ac_cv_func_lutimes=no \
            ac_cv_func_setpwent=no \
            ac_cv_func_getpwent=no \
            ac_cv_func_endpwent=no \
            ac_cv_func_getspnam=no \
            ac_cv_func_getspent=no \
            ac_cv_func_setgroups=no \
            ac_cv_func_initgroups=no \
            ac_cv_func_setlocale=yes \
            ac_cv_func_getgrouplist=no \
            ac_cv_func_login_tty=no \
            ac_cv_func_openpty=no \
            ac_cv_func_forkpty=no \
            ac_cv_func_clock_settime=no \
            ac_cv_func_sendfile=yes \
            ac_cv_func_getloadavg=no \
            ac_cv_header_spawn_h=no

          # Write Setup.local to compile essential C modules as built-in (static).
          # Paths are relative to the Modules/ directory.
          DEPS="$HOME/android-deps"
          cat > Modules/Setup.local << SETUP
          # --- Process / OS ---
          _posixsubprocess _posixsubprocess.c
          select selectmodule.c
          fcntl fcntlmodule.c
          mmap mmapmodule.c
          resource resource.c
          termios termios.c
          _multiprocessing _multiprocessing/multiprocessing.c _multiprocessing/semaphore.c

          # --- Data structures ---
          _struct _struct.c
          array arraymodule.c
          _queue _queuemodule.c
          _bisect _bisectmodule.c
          _heapq _heapqmodule.c

          # --- Serialization ---
          _csv _csv.c
          _pickle _pickle.c
          _json _json.c
          binascii binascii.c

          # --- Core ---
          _contextvars _contextvarsmodule.c
          _datetime _datetimemodule.c
          _random _randommodule.c
          _opcode _opcode.c
          unicodedata unicodedata.c
          _statistics _statisticsmodule.c

          # --- Math ---
          math mathmodule.c _math.c -lm
          cmath cmathmodule.c _math.c -lm

          # --- Compression ---
          zlib zlibmodule.c -I${DEPS}/include -L${DEPS}/lib -lz

          # --- Hashing ---
          _md5 md5module.c
          _sha1 sha1module.c
          _sha256 sha256module.c
          _sha512 sha512module.c
          _sha3 _sha3/sha3module.c
          _blake2 _blake2/blake2module.c _blake2/blake2b_impl.c _blake2/blake2s_impl.c

          # --- SSL / TLS ---
          _ssl _ssl.c -I${DEPS}/include -L${DEPS}/lib -lssl -lcrypto
          _hashlib _hashopenssl.c -I${DEPS}/include -L${DEPS}/lib -lssl -lcrypto

          # --- Networking ---
          _socket socketmodule.c

          # --- XML ---
          pyexpat pyexpat.c expat/xmlparse.c expat/xmlrole.c expat/xmltok.c -I\$(srcdir)/Modules/expat -DHAVE_EXPAT_CONFIG_H -DXML_POOR_ENTROPY -DUSE_PYEXPAT_CAPI
          _elementtree _elementtree.c -I\$(srcdir)/Modules/expat -DHAVE_EXPAT_CONFIG_H -DXML_POOR_ENTROPY -DUSE_PYEXPAT_CAPI

          # --- CJK Codecs ---
          _multibytecodec cjkcodecs/multibytecodec.c
          _codecs_cn cjkcodecs/_codecs_cn.c
          _codecs_hk cjkcodecs/_codecs_hk.c
          _codecs_iso2022 cjkcodecs/_codecs_iso2022.c
          _codecs_jp cjkcodecs/_codecs_jp.c
          _codecs_kr cjkcodecs/_codecs_kr.c
          _codecs_tw cjkcodecs/_codecs_tw.c

          # --- ctypes ---
          _ctypes _ctypes/ctypes.c _ctypes/callbacks.c _ctypes/callproc.c _ctypes/stgdict.c _ctypes/cfield.c -I${DEPS}/include -L${DEPS}/lib -lffi

          # --- readline (optional but nice) ---
          readline readline.c -lreadline -ltermcap
          SETUP

          echo "=== Modules/Setup.local ==="
          cat Modules/Setup.local

          make -j$(nproc)
          make install

      # ── Step 5: Verify and package ──
      - name: Verify binary
        run: |
          file $HOME/python-android/bin/python3.10
          $HOME/host-python/bin/python3.10 -c "
          import subprocess
          result = subprocess.run(['file', '$HOME/python-android/bin/python3.10'], capture_output=True, text=True)
          print(result.stdout)
          assert 'aarch64' in result.stdout.lower() or 'arm' in result.stdout.lower(), 'Not an ARM64 binary!'
          print('✅ Verified: ARM64 Android binary')
          "

      - name: Package Python distribution
        run: |
          cd $HOME/python-android
          tar -czvf $GITHUB_WORKSPACE/python3.10-android-aarch64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: python3.10-android-aarch64
          path: python3.10-android-aarch64.tar.gz
          if-no-files-found: error
