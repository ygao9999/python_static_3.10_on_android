###############################################################################
# Cross-compile CPython for Android (aarch64)
#
# Two build modes:
#   shared  – uses the official android.py script (default, reliable)
#   static  – patches the build to produce a statically linked python binary
#
# Trigger:
#   • push / PR to main
#   • manual workflow_dispatch (choose branch, arch, mode)
###############################################################################

name: Build Python for Android

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cpython_branch:
        description: "CPython branch / tag to build"
        required: true
        default: "3.14"
      host_triplet:
        description: "Android target triplet"
        required: true
        default: "aarch64-linux-android"
        type: choice
        options:
          - aarch64-linux-android
          - arm-linux-androideabi
          - x86_64-linux-android
          - i686-linux-android
      build_mode:
        description: "Build mode"
        required: true
        default: "static"
        type: choice
        options:
          - static
          - shared

env:
  CPYTHON_BRANCH: ${{ github.event.inputs.cpython_branch || '3.14' }}
  HOST_TRIPLET:   ${{ github.event.inputs.host_triplet   || 'aarch64-linux-android' }}
  BUILD_MODE:     ${{ github.event.inputs.build_mode     || 'static' }}

jobs:
  build:
    name: "Python ${{ github.event.inputs.cpython_branch || '3.14' }} – ${{ github.event.inputs.host_triplet || 'aarch64-linux-android' }} (${{ github.event.inputs.build_mode || 'static' }})"
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # ── 1. Checkout this repo (for scripts / patches if any) ──────────
      - name: Checkout this repository
        uses: actions/checkout@v4

      # ── 2. Install host build dependencies ────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            zlib1g-dev libbz2-dev libncurses-dev libffi-dev \
            libreadline-dev libsqlite3-dev libssl-dev \
            liblzma-dev uuid-dev curl git

      # ── 3. Set up Android SDK + NDK ───────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Verify ANDROID_HOME
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME" || true
          # The NDK will be downloaded automatically by android-env.sh

      # ── 4. Clone CPython source ───────────────────────────────────────
      - name: Clone CPython (${{ env.CPYTHON_BRANCH }})
        run: |
          git clone --depth 1 --branch "$CPYTHON_BRANCH" \
            https://github.com/python/cpython.git cpython
          echo "--- CPython version info ---"
          head -5 cpython/Include/patchlevel.h || true

      # ── 5. Cache dependency downloads ─────────────────────────────────
      - name: Cache cross-build downloads
        uses: actions/cache@v4
        with:
          path: cpython/cross-build/downloads
          key: cpython-deps-${{ env.HOST_TRIPLET }}-${{ env.CPYTHON_BRANCH }}

      # ── 6A. SHARED build (official android.py) ────────────────────────
      - name: "Build (shared mode) – configure & make"
        if: env.BUILD_MODE == 'shared'
        working-directory: cpython
        run: |
          python3 Android/android.py configure-build
          python3 Android/android.py make-build
          python3 Android/android.py configure-host "$HOST_TRIPLET"
          python3 Android/android.py make-host     "$HOST_TRIPLET"

      # ── 6B. STATIC build (patched manual approach) ────────────────────
      #
      # The official android.py hardcodes --enable-shared.
      # For a static binary we:
      #   a) Build the "build" Python normally (needed for cross-compile)
      #   b) Source android-env.sh to get the cross-compiler env vars
      #   c) Run configure manually WITHOUT --enable-shared
      #   d) Patch Modules/Setup to statically compile key modules
      #   e) Run make
      #
      - name: "Build (static mode) – step 1: build Python for host machine"
        if: env.BUILD_MODE == 'static'
        working-directory: cpython
        run: |
          python3 Android/android.py configure-build
          python3 Android/android.py make-build

      - name: "Build (static mode) – step 2: download dependencies"
        if: env.BUILD_MODE == 'static'
        working-directory: cpython
        run: |
          # Use android.py to download and unpack deps into the prefix dir
          # We configure-host first (which downloads deps), then we'll
          # blow away its config and redo it with static flags.
          python3 Android/android.py configure-host "$HOST_TRIPLET" || true

      - name: "Build (static mode) – step 3: re-configure with static flags"
        if: env.BUILD_MODE == 'static'
        working-directory: cpython
        run: |
          set -euo pipefail

          HOST_DIR="cross-build/$HOST_TRIPLET"
          PREFIX_DIR="$HOST_DIR/prefix"
          BUILD_PYTHON="$(pwd)/cross-build/build/python"

          # Source the Android env to get CC, CFLAGS, etc.
          export HOST="$HOST_TRIPLET"
          export PREFIX="$(pwd)/$PREFIX_DIR"
          source Android/android-env.sh

          cd "$HOST_DIR"

          BUILD_GNU_TYPE=$("$BUILD_PYTHON" -c \
            "import sysconfig; print(sysconfig.get_config_var('BUILD_GNU_TYPE'))")

          # Run configure with STATIC flags
          ../../configure \
            --host="$HOST_TRIPLET" \
            --build="$BUILD_GNU_TYPE" \
            --with-build-python="$BUILD_PYTHON" \
            --without-ensurepip \
            --disable-shared \
            --without-static-libpython=no \
            --with-openssl="$(pwd)/prefix" \
            --prefix="$(pwd)/prefix" \
            LDFLAGS="${LDFLAGS:-} -static" \
            CFLAGS="${CFLAGS:-} -fPIC" \
            CPPFLAGS="${CPPFLAGS:-} -fPIC"

      - name: "Build (static mode) – step 4: patch Modules/Setup for static modules"
        if: env.BUILD_MODE == 'static'
        working-directory: cpython
        run: |
          set -euo pipefail

          HOST_DIR="cross-build/$HOST_TRIPLET"
          SETUP_LOCAL="$HOST_DIR/Modules/Setup.local"
          PREFIX="$(pwd)/$HOST_DIR/prefix"

          # Create Setup.local to statically build common extension modules.
          # Modules listed here will be compiled into the python binary.
          cat > "$SETUP_LOCAL" << 'MODULES_EOF'
          # ---- Statically compiled modules ----
          *static*

          # --- Standard library modules ---
          array arraymodule.c
          _asyncio _asynciomodule.c
          _bisect _bisectmodule.c
          _contextvars _contextvarsmodule.c
          _csv _csv.c
          _datetime _datetimemodule.c
          _heapq _heapqmodule.c
          _json _json.c
          _lsprof _lsprof.c
          _opcode _opcode.c
          _pickle _pickle.c
          _queue _queuemodule.c
          _random _randommodule.c
          _socket socketmodule.c
          _statistics _statisticsmodule.c
          _struct _struct.c
          _typing _typingmodule.c
          binascii binascii.c
          cmath cmathmodule.c
          math mathmodule.c
          mmap mmapmodule.c
          select selectmodule.c
          unicodedata unicodedata.c
          zlib zlibmodule.c -lz
          _zoneinfo _zoneinfo.c

          # --- Compression ---
          _bz2 _bz2module.c -lbz2
          _lzma _lzmamodule.c -llzma

          # --- Hashing ---
          _md5 md5module.c
          _sha1 sha1module.c
          _sha2 sha2module.c
          _sha3 sha3module.c
          _blake2 _blake2/blake2module.c _blake2/blake2b_impl.c _blake2/blake2s_impl.c

          # --- FFI ---
          _ctypes _ctypes/_ctypes.c _ctypes/callbacks.c _ctypes/callproc.c _ctypes/stgdict.c _ctypes/cfield.c -lffi

          # --- Database ---
          _sqlite3 _sqlite3/blob.c _sqlite3/connection.c _sqlite3/cursor.c _sqlite3/microprotocols.c _sqlite3/module.c _sqlite3/prepare_protocol.c _sqlite3/row.c _sqlite3/statement.c _sqlite3/util.c -lsqlite3

          # --- SSL/TLS ---
          _ssl _ssl.c -lssl -lcrypto
          _hashlib _hashopenssl.c -lssl -lcrypto
          MODULES_EOF

          echo "--- Modules/Setup.local ---"
          cat "$SETUP_LOCAL"

      - name: "Build (static mode) – step 5: make"
        if: env.BUILD_MODE == 'static'
        working-directory: cpython
        run: |
          set -euo pipefail

          HOST_DIR="cross-build/$HOST_TRIPLET"
          PREFIX_DIR="$HOST_DIR/prefix"

          export HOST="$HOST_TRIPLET"
          export PREFIX="$(pwd)/$PREFIX_DIR"
          source Android/android-env.sh

          cd "$HOST_DIR"

          # Build with all available cores
          make -j"$(nproc)" 2>&1 | tail -100

          echo ""
          echo "========================================="
          echo "  Build complete!"
          echo "========================================="

          # Show binary info
          if [ -f python ]; then
            echo "--- file python ---"
            file python
            echo "--- size ---"
            ls -lh python
          elif [ -f python.exe ]; then
            file python.exe
            ls -lh python.exe
          else
            echo "WARNING: python binary not found in $(pwd)"
            ls -la
          fi

      - name: "Build (static mode) – step 6: install to prefix"
        if: env.BUILD_MODE == 'static'
        working-directory: cpython
        run: |
          set -euo pipefail
          HOST_DIR="cross-build/$HOST_TRIPLET"
          cd "$HOST_DIR"
          make install prefix="$(pwd)/prefix" 2>&1 | tail -20 || true

      # ── 7. Verify the built binary ───────────────────────────────────
      - name: Verify build artifacts
        working-directory: cpython
        run: |
          set -euo pipefail
          HOST_DIR="cross-build/$HOST_TRIPLET"

          echo "=== Build output directory ==="
          ls -la "$HOST_DIR/" | head -20

          echo ""
          echo "=== Searching for python binary ==="
          find "$HOST_DIR" -name 'python*' -type f ! -name '*.py' ! -name '*.pyc' ! -name '*.o' | head -20

          echo ""
          echo "=== Checking binary type ==="
          PYTHON_BIN=$(find "$HOST_DIR" -maxdepth 1 -name 'python*' -type f ! -name '*.py' ! -name '*.o' | head -1)
          if [ -n "$PYTHON_BIN" ]; then
            file "$PYTHON_BIN"
            ls -lh "$PYTHON_BIN"
          fi

          echo ""
          echo "=== Prefix directory ==="
          ls "$HOST_DIR/prefix/bin/" 2>/dev/null | head -10 || echo "(no prefix/bin)"
          ls "$HOST_DIR/prefix/lib/" 2>/dev/null | head -10 || echo "(no prefix/lib)"

      # ── 8. Package artifacts ──────────────────────────────────────────
      - name: Prepare release artifacts
        id: package
        working-directory: cpython
        run: |
          set -euo pipefail

          HOST_DIR="cross-build/$HOST_TRIPLET"
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/artifacts"
          mkdir -p "$ARTIFACT_DIR"

          # Determine arch label from triplet
          ARCH_LABEL="${HOST_TRIPLET%%-*}"

          # Copy the python binary
          PYTHON_BIN=$(find "$HOST_DIR" -maxdepth 1 -name 'python*' -type f ! -name '*.py' ! -name '*.o' | head -1)
          if [ -n "$PYTHON_BIN" ]; then
            cp "$PYTHON_BIN" "$ARTIFACT_DIR/python3-${ARCH_LABEL}"
          fi

          # Copy the lib directory (standard library)
          if [ -d "$HOST_DIR/prefix/lib" ]; then
            tar czf "$ARTIFACT_DIR/python3-stdlib-${ARCH_LABEL}-android.tar.gz" \
              -C "$HOST_DIR/prefix" lib/
          fi

          # Copy shared libraries if present (shared mode)
          if ls "$HOST_DIR"/libpython*.so* 1>/dev/null 2>&1; then
            cp "$HOST_DIR"/libpython*.so* "$ARTIFACT_DIR/" || true
          fi

          # Copy static lib if present
          if ls "$HOST_DIR"/libpython*.a 1>/dev/null 2>&1; then
            cp "$HOST_DIR"/libpython*.a "$ARTIFACT_DIR/" || true
          fi

          echo "=== Artifacts ==="
          ls -lh "$ARTIFACT_DIR/"

          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"
          echo "arch_label=$ARCH_LABEL"     >> "$GITHUB_OUTPUT"

      # ── 9. Upload as GitHub artifact ──────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "python-${{ env.CPYTHON_BRANCH }}-${{ steps.package.outputs.arch_label }}-android-${{ env.BUILD_MODE }}"
          path: artifacts/
          retention-days: 30

      # ── 10. Create GitHub Release (on tag push) ───────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
